<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>五體工作室 | Orz.tw - 軟體開發與自動化解決方案</title>
    <meta name="description" content="五體工作室專注於 Web App 程式設計、軟體工程、游泳成績資訊管理與賽事資訊整合平台。讓我們幫您實現自動化的願望。" />
    <meta name="keywords" content="軟體開發, Web App, 程式設計, 游泳成績管理, 賽事資訊, 自動化, 五體工作室" />
    <link rel="canonical" href="https://orz.tw" />
    <script>
      // Apply theme immediately to prevent flash
      (function() {
        var theme = localStorage.getItem('theme');
        var isDark = theme ? theme === 'dark' : true;
        if (isDark) document.documentElement.classList.add('dark');
      })();
    </script>
    <style>
      /* Loading screen - matches dark default */
      #loading {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #050505;
        transition: opacity 0.3s ease-out;
      }
      html:not(.dark) #loading {
        background: #fafaf9;
      }
      #loading.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #loading-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(255,255,255,0.1);
        border-top-color: #14b8a6;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      html:not(.dark) #loading-spinner {
        border-color: rgba(0,0,0,0.08);
        border-top-color: #0f766e;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7917477232866656" crossorigin="anonymous"></script>
  </head>
  <body>
    <div id="loading"><div id="loading-spinner"></div></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
