<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>五體工作室 | Orz.tw - 軟體開發與自動化解決方案</title>
    <meta name="description" content="五體工作室專注於 Web App 程式設計、軟體工程、游泳成績資訊管理與賽事資訊整合平台。讓我們幫您實現自動化的願望。" />
    <meta name="keywords" content="軟體開發, Web App, 程式設計, 游泳成績管理, 賽事資訊, 自動化, 五體工作室" />
    <link rel="canonical" href="https://orz.tw" />
    <script>
      // Apply theme immediately to prevent flash
      (function() {
        var theme = localStorage.getItem('theme');
        var isDark = theme ? theme === 'dark' : true;
        if (isDark) document.documentElement.classList.add('dark');
      })();
    </script>
    <style>
      #loading {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
        background: #050505;
        transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      }
      html:not(.dark) #loading {
        background: #fafaf9;
      }
      #loading.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #loading-logo {
        font-size: 28px;
        font-weight: 700;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        color: #0f766e;
        opacity: 0;
        animation: logo-in 0.6s ease-out 0.1s forwards;
      }
      #loading-logo span {
        color: #ea580c;
      }
      #loading-bar {
        width: 120px;
        height: 2px;
        background: rgba(255,255,255,0.08);
        border-radius: 2px;
        overflow: hidden;
        opacity: 0;
        animation: logo-in 0.4s ease-out 0.4s forwards;
      }
      html:not(.dark) #loading-bar {
        background: rgba(0,0,0,0.06);
      }
      #loading-bar::after {
        content: '';
        display: block;
        width: 40%;
        height: 100%;
        background: linear-gradient(90deg, #0f766e, #14b8a6);
        border-radius: 2px;
        animation: bar-slide 1.2s ease-in-out infinite;
      }
      @keyframes logo-in {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes bar-slide {
        0% { transform: translateX(-100%); }
        50% { transform: translateX(200%); }
        100% { transform: translateX(-100%); }
      }
    </style>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7917477232866656" crossorigin="anonymous"></script>
  </head>
  <body>
    <div id="loading">
      <div id="loading-logo">Orz<span>.tw</span></div>
      <div id="loading-bar"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
